# Paths
data_dir: ./logs
model_save_path: logseer.keras
tokenizer_path: tokenizer.pickle

# Data
numchar: 3000
toid: 6000
validation_split: 0.1
validate_on_test_data: false
success_log_ratio: 99
success_log_ratio_test: 12.4

# Model
model_name: LogCNNLite
embedding_layer: vanilla
embedding_dim: 32
max_nb_words: 24000
max_sequence_length: 26000

# Training
epochs: 60
batch_size: 32
learning_rate: 0.0003
repetition: 100
retrain: false
nn_error_weight: 2

# sklearn models to train (any combination of: xgb, svm, rf)
sklearn_models: [xgb]
# Which one is the NN ensemble partner (defaults to first in sklearn_models)
ensemble_model: xgb
sklearn_weight: 6

# Early stopping
use_early_stopping: true
patience: 15
restore_best_weights: false
es_start_from_epoch: 10
monitor: val_f1
mode: max

# Checkpoint: multi_metric | best_f1 | standard
checkpoint_type: best_f1
start_from_epoch: 0
max_loss: 0.7

# Thresholds
nn_threshold: 0.5
sklearn_threshold: 0.5

# Probability dump for threshold analysis (writes proba.csv)
dump_proba: false
